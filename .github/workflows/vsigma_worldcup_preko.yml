name: vSIGMA World Cup PRE-KO Alert (Telegram)

# ISOLATED, FOCUSED per-match alert ~1h before kickoff, on the OFFICIAL lineup. Does NOT touch
# the betting pipeline / production workflows, and does NOT re-send the daily briefing. It only
# fires ONE compact message per match the moment its starting XI is CONFIRMED and kickoff is
# imminent — so real rotations get captured. Anti-spam: no candidate -> sends nothing. PURIFIED:
# own L3 model + shadow props only, ZERO market/odds. Explicit git add (dedup state + props/cache).

on:
  workflow_dispatch:
    inputs:
      within_hours:
        description: "Construir cards de partidos que arrancan en las próximas N horas (margen para alineaciones)"
        required: false
        default: "3"
      max_fixtures:
        description: "Máximo de fixtures a procesar en el build de cards"
        required: false
        default: "12"

  # SCHEDULE (UTC) — frecuente DENTRO de la ventana de partidos del Mundial. Repo público =
  # minutos ilimitados. Cada corrida es barata (API store-guarded) y SILENCIOSA si no hay
  # ningún partido inminente con XI confirmado aún no avisado.
  schedule:
    - cron: "*/30 17-23 * * *"   # 17:00–23:30 UTC, cada 30 min (tarde/noche europea)
    - cron: "*/30 0-4 * * *"     # 00:00–04:30 UTC, cada 30 min (sesión nocturna / América)

# contents: write SOLO para commitear el estado de dedup + props/cache (rutas explícitas).
permissions:
  contents: write

# Grupo PROPIO: no cancela ni es cancelado por el briefing diario (vsigma-worldcup-cards).
concurrency:
  group: vsigma-worldcup-preko
  cancel-in-progress: false

jobs:
  preko-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore .env from GitHub Secret
        env:
          VSIGMA_ENV_B64: ${{ secrets.VSIGMA_ENV_B64 }}
        run: |
          if [ -z "$VSIGMA_ENV_B64" ]; then
            echo "::error::Missing secret VSIGMA_ENV_B64"
            exit 1
          fi
          echo "$VSIGMA_ENV_B64" | base64 --decode > .env
          chmod 600 .env
          echo ".env restored ($(wc -l < .env) lines)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Window (UTC)
        id: win
        run: |
          WH="${{ github.event.inputs.within_hours || '3' }}"
          FROM="$(date -u +%Y-%m-%d)"
          TO="$(date -u -d '+1 day' +%Y-%m-%d)"   # cubre saques que cruzan medianoche
          { echo "from=$FROM"; echo "to=$TO"; echo "wh=$WH"; } >> "$GITHUB_OUTPUT"
          echo "PRE-KO window: within ${WH}h, dates $FROM..$TO"

      # 1) Build cards PRE-KO: re-predicts NS via lock-at-KO and (for imminent fixtures, ≤WHh)
      #    fetches /fixtures/lineups -> lineup_home/away == 'conf' once the XI is published.
      #    SOFT: a failure leaves the previous cards.csv; selection's anti-hindsight still holds.
      - name: Build PRE-KO cards (own model, lineups for imminent; NO odds)
        continue-on-error: true
        run: |
          python analysis/worldcup/build_worldcup_cards.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            --within-hours "${{ steps.win.outputs.wh }}" \
            --lineups-hours "${{ steps.win.outputs.wh }}" \
            --max-fixtures "${{ github.event.inputs.max_fixtures || '12' }}"

      # 2) Re-predict player props (NS, anti-hindsight). get_xi picks up the CONFIRMED startXI
      #    once published -> basis=lineup_confirmed -> the props block reads '(XI confirmado)'.
      - name: Player props — predict (NS, shadow, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/worldcup_player_props.py predict

      # 3) Select ONLY imminent (≤90 min) + BOTH-XI-confirmed + not-already-alerted fixtures.
      #    Writes a manifest (one focused message per match) + a pending list (not yet marked).
      - name: Select pre-KO candidates (imminent + confirmed + unsent)
        id: select
        run: |
          python analysis/worldcup/build_worldcup_preko_alerts.py select
          echo "----- preko preview -----"
          cat analysis/worldcup/worldcup_preko_preview.txt || true
          MAN="analysis/worldcup/worldcup_preko_manifest.txt"
          N="$(grep -c . "$MAN" 2>/dev/null || echo 0)"
          if [ "${N:-0}" -gt 0 ]; then echo "has_messages=true" >> "$GITHUB_OUTPUT";
          else echo "has_messages=false" >> "$GITHUB_OUTPUT"; fi
          echo "preko messages to send: ${N:-0}"

      # ANTI-SPAM: send ONLY if there is a candidate. One dispatcher call per message
      #            (shared dispatcher, NOT modified).
      - name: Send pre-KO alert(s) to Telegram
        if: ${{ steps.select.outputs.has_messages == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MAN="analysis/worldcup/worldcup_preko_manifest.txt"
          while IFS='|' read -r f t; do
            [ -z "$f" ] && continue
            echo "-> $t"
            python scripts/dispatch_telegram_alert.py \
              --title "$t" --date "${{ steps.win.outputs.from }}" --body-file "$f"
            sleep 1
          done < "$MAN"

      # 4) Mark the just-sent fixtures (dedup state). ONLY runs after the send step -> a run that
      #    dies before sending never marks a fixture as alerted.
      - name: Mark sent (dedup state)
        if: ${{ steps.select.outputs.has_messages == 'true' }}
        run: python analysis/worldcup/build_worldcup_preko_alerts.py mark-sent

      # 5) Persist EXPLICIT paths only: dedup state (essential) + shadow props log + L3 cache
      #    (lock-at-KO upserts). NEVER `git add .`. Rebase-retry to survive the busy main branch.
      - name: Persist dedup state + props log + L3 cache (explicit paths)
        if: ${{ steps.select.outputs.has_messages == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for p in analysis/worldcup/worldcup_preko_sent.csv \
                   analysis/worldcup/worldcup_player_props_log.csv \
                   analysis/worldcup/worldcup_our_model_predictions.csv; do
            [ -f "$p" ] && git add "$p" || true
          done
          if git diff --cached --quiet; then
            echo "preko: no state changes to commit."
          else
            git commit -m "vSIGMA World Cup PRE-KO alert ${{ steps.win.outputs.from }} [skip ci]"
            pushed=0
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { pushed=1; break; }
              echo "push retry $i failed; re-syncing..."
              sleep 5
            done
            if [ "$pushed" != "1" ]; then
              echo "::warning::preko push failed after retries (alert already sent)."
            fi
          fi
