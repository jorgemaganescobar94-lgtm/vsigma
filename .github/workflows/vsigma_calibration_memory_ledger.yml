name: vSIGMA Calibration Memory Ledger

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"

      - name: Build calibration memory ledger
        shell: bash
        run: python scripts/build_calibration_memory_ledger.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Commit report
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/ledger/vsigma_stat_calibration_memory.csv data/processed/today/${VSIGMA_DATE}/vsigma_calibration_memory_ledger.* data/processed/today/${VSIGMA_DATE}/vsigma_calibration_memory_summary.csv data/processed/governance/vsigma_calibration_memory_ledger.* data/processed/governance/vsigma_calibration_memory_summary.csv 2>/dev/null || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "vSIGMA calibration memory ledger ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
