name: vSIGMA Prelock Live Recheck

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  schedule:
    # UTC checkpoints. Atlantic/Canary date is resolved inside workflow.
    - cron: "0 10 * * *"
    - cron: "0 12 * * *"
    - cron: "0 14 * * *"
    - cron: "0 16 * * *"
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: vsigma-prelock-live-recheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
      - name: Build report
        shell: bash
        run: python scripts/build_prelock_live_recheck.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Commit report
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_prelock_live_recheck.* data/processed/governance/vsigma_prelock_live_recheck.* 2>/dev/null || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "vSIGMA prelock live recheck ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
