name: vSIGMA Formula Patch Governance

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: vsigma-formula-patch-governance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
      - name: Build patch proposals
        shell: bash
        run: python scripts/build_shadow_calibration_patch_proposals.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Build review pack
        shell: bash
        run: python scripts/build_formula_patch_review_pack.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Build dry-run diff
        shell: bash
        run: python scripts/build_formula_patch_dry_run_diff.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Build dry-run backtest
        shell: bash
        run: python scripts/build_formula_patch_dry_run_backtest.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Build decision gate
        shell: bash
        run: python scripts/build_formula_patch_dry_run_decision_gate.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Build governance dashboard
        shell: bash
        run: python scripts/build_formula_patch_governance_dashboard.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Write run summary
        shell: bash
        run: python scripts/append_actions_formula_patch_governance_summary.py --date "$VSIGMA_DATE" --output "$GITHUB_STEP_SUMMARY"
      - name: Commit governance outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_shadow_calibration_patch_proposals.* data/processed/today/${VSIGMA_DATE}/vsigma_formula_patch_* data/processed/governance/vsigma_shadow_calibration_patch_proposals.* data/processed/governance/vsigma_formula_patch_* 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No formula patch governance changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA formula patch governance ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
