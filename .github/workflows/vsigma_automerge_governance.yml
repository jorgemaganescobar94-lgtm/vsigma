name: vSIGMA Automerge Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  automerge-governed:
    runs-on: ubuntu-latest

    steps:
      - name: Validate automerge eligibility
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          echo "labels: $LABELS_JSON"
          echo "is_draft: $IS_DRAFT"
          echo "head_ref: $HEAD_REF"

          if [[ "$LABELS_JSON" != *"automerge-safe"* ]]; then
            echo "No automerge-safe label; exiting without merge."
            exit 0
          fi

          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "Draft PR; exiting without merge."
            exit 0
          fi

          if [[ "$HEAD_REF" != vsigma-* && "$HEAD_REF" != codex/* ]]; then
            echo "Branch not eligible for guarded automerge: $HEAD_REF"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate trusted author
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          TRUSTED=false

          if [[ "$PR_AUTHOR" == "$REPO_OWNER" ]]; then
            TRUSTED=true
          fi

          if [[ "$PR_AUTHOR" == "github-actions[bot]" || "$PR_AUTHOR" == "codex[bot]" || "$PR_AUTHOR" == "openai-codex[bot]" ]]; then
            TRUSTED=true
          fi

          if [[ "$TRUSTED" != "true" ]]; then
            echo "Untrusted PR author: $PR_AUTHOR"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run automerge guardrails (trusted copy from base branch)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: origin/${{ github.head_ref }}
        run: |
          set -euo pipefail
          # origin/<base> ya está disponible porque el Checkout usa fetch-depth: 0
          # (de hecho el propio --base-ref lo usa para el git diff base...head).
          # Extraemos el guardrail DE LA BASE a un archivo temporal y ejecutamos ESE,
          # nunca la copia del árbol del PR (HEAD), para que un PR no pueda
          # autovalidarse con un guardrail manipulado.
          GUARD="$(mktemp)"
          if ! git show "${BASE_REF}:scripts/check_automerge_guardrails.py" > "${GUARD}"; then
            echo "::error::check_automerge_guardrails.py no existe en la base (${BASE_REF}); se rechaza el automerge (fail-closed)."
            exit 1
          fi
          python "${GUARD}" --base-ref "${BASE_REF}" --head-ref "${HEAD_REF}"

      - name: Run relevant tests
        run: python -m pytest tests/test_automerge_guardrails.py -q

      - name: Validate clean patch formatting
        run: git diff --check

      - name: Merge guarded PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --merge --delete-branch

      - name: Summarize guarded automerge decision
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            BODY="✅ Guardrails passed; PR was merged with guarded automerge."
          else
            BODY="❌ Guardrails or checks failed; PR was not merged automatically. Review workflow logs for blocked file or failing check details."
          fi

          gh pr comment "$PR_NUMBER" --body "$BODY"
