name: vSIGMA Production

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo: health | pre | auto | prelock | post | post-yesterday"
        required: true
        default: "health"
        type: choice
        options:
          - health
          - pre
          - auto
          - prelock
          - post-yesterday
          - post
      date:
        description: "Fecha YYYY-MM-DD. Vacío = hoy en Atlantic/Canary"
        required: false
        default: ""

  schedule:
    # 08:15 Atlantic/Canary - backup de resultados de ayer
    - cron: "15 8 * * *"
      timezone: "Atlantic/Canary"

    # 09:00 Atlantic/Canary - PRE
    - cron: "0 9 * * *"
      timezone: "Atlantic/Canary"

    # 10:00 colchón - preserva la ventana PRELOCK de 90 min para saques tempranos
    - cron: "0 10 * * *"
      timezone: "Atlantic/Canary"

    # Checkpoints cada 2h (11,13,15,17,19,21,23) Atlantic/Canary
    - cron: "0 11-23/2 * * *"
      timezone: "Atlantic/Canary"

    # 23:55 Atlantic/Canary - POST
    - cron: "55 23 * * *"
      timezone: "Atlantic/Canary"

permissions:
  contents: write
  issues: write

concurrency:
  group: vsigma-production-main
  cancel-in-progress: false

jobs:
  run-vsigma:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore .env from GitHub Secret
        env:
          VSIGMA_ENV_B64: ${{ secrets.VSIGMA_ENV_B64 }}
        run: |
          if [ -z "$VSIGMA_ENV_B64" ]; then
            echo "::error::Missing secret VSIGMA_ENV_B64"
            exit 1
          fi

          echo "$VSIGMA_ENV_B64" | base64 --decode > .env
          chmod 600 .env
          echo ".env restored"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Decide vSIGMA mode and date
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          SCHEDULE="${{ github.event.schedule }}"
          MODE="${{ github.event.inputs.mode }}"
          DATE_INPUT="${{ github.event.inputs.date }}"

          TODAY="$(TZ=Atlantic/Canary date +%F)"
          YESTERDAY="$(TZ=Atlantic/Canary date -d 'yesterday' +%F)"

          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$SCHEDULE" in
              "15 8 * * *")
                MODE="post-yesterday"
                DATE_INPUT="$YESTERDAY"
                ;;
              "0 9 * * *")
                MODE="pre"
                DATE_INPUT="$TODAY"
                ;;
              "0 10-23 * * *"|"30 9-23 * * *")
                MODE="auto"
                DATE_INPUT="$TODAY"
                ;;
              "55 23 * * *")
                MODE="post"
                DATE_INPUT="$TODAY"
                ;;
              *)
                MODE="health"
                DATE_INPUT="$TODAY"
                ;;
            esac
          fi

          if [ -z "$MODE" ]; then
            MODE="health"
          fi

          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT="$TODAY"
          fi

          echo "VSIGMA_MODE=$MODE" >> "$GITHUB_ENV"
          echo "VSIGMA_DATE=$DATE_INPUT" >> "$GITHUB_ENV"

          echo "Mode: $MODE"
          echo "Date: $DATE_INPUT"

      - name: Run vSIGMA
        shell: bash
        run: |
          echo "Running vSIGMA mode=$VSIGMA_MODE date=$VSIGMA_DATE"

          if [ "$VSIGMA_MODE" = "health" ]; then
            python scripts/run_vsigma_healthcheck.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --mode full

          elif [ "$VSIGMA_MODE" = "pre" ]; then
            python scripts/run_daily_competition_controller.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --mode pre

          elif [ "$VSIGMA_MODE" = "auto" ]; then
            python scripts/run_vsigma_auto_controller.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --window-minutes 90

          elif [ "$VSIGMA_MODE" = "prelock" ]; then
            python scripts/run_today_prelock_pipeline.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --window-minutes 90

          elif [ "$VSIGMA_MODE" = "post" ]; then
            python scripts/run_daily_competition_controller.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --mode post

          elif [ "$VSIGMA_MODE" = "post-yesterday" ]; then
            python scripts/run_daily_competition_controller.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --mode post

          else
            echo "Invalid mode: $VSIGMA_MODE"
            exit 2
          fi

      - name: Build PRELOCK exclusion audit
        shell: bash
        run: |
          if [ "$VSIGMA_MODE" = "auto" ]; then
            echo "PRELOCK exclusion audit already built by auto controller."
          else
            python scripts/build_prelock_exclusion_audit.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          fi

      - name: Build autonomous monitoring summary
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"
          TARGET_MODE="${VSIGMA_MODE:-unknown}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python scripts/build_autonomous_monitoring_summary.py \
            --date "$TARGET_DATE" \
            --mode "$TARGET_MODE" \
            --timezone Atlantic/Canary \
            --run-url "$RUN_URL" \
            || echo "::warning::Autonomous monitoring summary failed; inspect workflow logs."

      - name: Dispatch monitoring notification
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"
          TARGET_MODE="${VSIGMA_MODE:-unknown}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python scripts/dispatch_autonomous_monitoring_notification.py \
            --date "$TARGET_DATE" \
            --mode "$TARGET_MODE" \
            --repo "${{ github.repository }}" \
            --run-url "$RUN_URL" \
            || echo "::warning::Monitoring notification dispatch failed; inspect workflow logs."

      - name: Build daily command center
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"
          TARGET_MODE="${VSIGMA_MODE:-unknown}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python scripts/build_daily_command_center.py \
            --date "$TARGET_DATE" \
            --mode "$TARGET_MODE" \
            --timezone Atlantic/Canary \
            --run-url "$RUN_URL" \
            || echo "::warning::Daily command center failed; inspect workflow logs."

      - name: Build learning ledger
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_learning_ledger.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Learning ledger failed; inspect workflow logs."

      - name: Build learning patterns
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_learning_patterns.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Learning pattern miner failed; inspect workflow logs."

      - name: Build improvement proposals
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_improvement_proposals.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Improvement proposal engine failed; inspect workflow logs."

      - name: Build shadow experiments
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_shadow_experiments.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Shadow experiment engine failed; inspect workflow logs."

      - name: Build shadow candidates
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_shadow_candidates.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Shadow candidate runner failed; inspect workflow logs."

      - name: Build shadow performance
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_shadow_performance.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Shadow performance tracker failed; inspect workflow logs."

      - name: Build review decision gate
        if: always()
        shell: bash
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"

          python scripts/build_promotion_gate.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            || echo "::warning::Review decision gate failed; inspect workflow logs."

      - name: Dispatch learning autopilot alerts
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_DATE="${VSIGMA_DATE:-$(TZ=Atlantic/Canary date +%F)}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python scripts/dispatch_learning_autopilot_alerts.py \
            --date "$TARGET_DATE" \
            --timezone Atlantic/Canary \
            --repo "${{ github.repository }}" \
            --run-url "$RUN_URL" \
            --dispatch \
            || echo "::warning::Learning autopilot alert dispatch failed; inspect workflow logs."

      - name: Upload daily audit artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: vsigma-${{ env.VSIGMA_MODE }}-${{ env.VSIGMA_DATE }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/processed/today/${{ env.VSIGMA_DATE }}/
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_learning_ledger.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_learning_patterns.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_improvement_proposals.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_shadow_experiments.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_shadow_candidates.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_shadow_performance.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_promotion_gate.*
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_learning_autopilot_alerts.*
            data/processed/snapshots/${{ env.VSIGMA_DATE }}/
            data/processed/governance/vsigma_autonomous_monitoring_summary.*
            data/processed/governance/vsigma_daily_command_center.*
            data/processed/governance/vsigma_learning_ledger.*
            data/processed/governance/vsigma_learning_patterns.*
            data/processed/governance/vsigma_improvement_proposals.*
            data/processed/governance/vsigma_shadow_experiments.*
            data/processed/governance/vsigma_shadow_candidates.*
            data/processed/governance/vsigma_shadow_performance.*
            data/processed/governance/vsigma_promotion_gate.*
            data/processed/governance/vsigma_learning_autopilot_alerts.*
            data/processed/vsigma_daily_competition_master_report.*
            data/processed/vsigma_prelock_exclusion_audit.*
            data/processed/vsigma_prelock_decision_resolver.*
            data/processed/vsigma_decision_outcome_ledger.*
            data/processed/vsigma_clv_calibration_report.*
            notes/
            outputs/

      - name: Commit vSIGMA outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add \
            data/raw \
            data/processed \
            notes \
            outputs \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA ${VSIGMA_MODE} ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main


