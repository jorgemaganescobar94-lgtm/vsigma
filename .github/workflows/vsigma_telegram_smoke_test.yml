name: vSIGMA Telegram Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vsigma-telegram-smoke-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirmar presencia de secrets (sin imprimir valores)
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "token presente: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo yes || echo no)"
          echo "chat_id presente: $([ -n "$TELEGRAM_CHAT_ID" ] && echo yes || echo no)"

      - name: Enviar mensaje de prueba a Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/dispatch_telegram_alert.py \
            --title "vSIGMA TEST" \
            --summary "Prueba de canal Telegram. Si ves esto, funciona." \
            --date "$(TZ=Atlantic/Canary date +%F)"
