name: vSIGMA World Cup Cards (Telegram)

# ISOLATED notification + learning-loop workflow. Does NOT touch the betting pipeline /
# production workflows / their scripts. It: builds the World Cup forecast card (L3 from
# committed ratings + fresh market odds via API), LOGS today's predictions, SETTLES
# finished fixtures, builds a track-record SCORECARD, sends the card (+ track record) to
# Telegram, and commits ONLY the log + scorecard back (explicit paths, never `git add .`).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo: morning (preview día completo) | preko (solo inminentes + cuota cierre + alineaciones)"
        required: false
        type: choice
        default: "morning"
        options: ["morning", "preko"]
      days_ahead:
        description: "MORNING: días hacia delante (ventana hoy..hoy+N, UTC)"
        required: false
        default: "1"
      within_hours:
        description: "PRE-KO: enviar solo partidos que arrancan en las próximas N horas"
        required: false
        default: "6"
      limit:
        description: "Máximo de partidos en el mensaje"
        required: false
        default: "10"

  # SCHEDULE — ACTIVO (UTC). 08:00 = briefing de mañana (día completo); el resto =
  # refrescos PRE-KO (solo inminentes, cuota de cierre + alineaciones) en las franjas
  # típicas del Mundial. Ajustar frecuencia aquí.
  schedule:
    - cron: "0 8 * * *"     # 08:00 UTC (09:00 Canarias) — briefing día completo
    - cron: "0 16 * * *"    # 16:00 UTC — refresco pre-KO
    - cron: "0 19 * * *"    # 19:00 UTC — refresco pre-KO
    - cron: "0 22 * * *"    # 22:00 UTC — refresco pre-KO
    - cron: "0 1 * * *"     # 01:00 UTC — refresco pre-KO (sesión nocturna)
  # Alternativas comentadas para ajustar (descomentar/quitar según calendario real):
  #   - cron: "0 18 * * *"   # cadencia anterior (una sola tarde)
  #   - cron: "0 13 * * *"   # franja mediodía si hay partidos tempranos

# contents: write SOLO para commitear el log + scorecard de aprendizaje (rutas explícitas).
permissions:
  contents: write

concurrency:
  group: vsigma-worldcup-cards
  cancel-in-progress: false

jobs:
  send-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore .env from GitHub Secret
        env:
          VSIGMA_ENV_B64: ${{ secrets.VSIGMA_ENV_B64 }}
        run: |
          if [ -z "$VSIGMA_ENV_B64" ]; then
            echo "::error::Missing secret VSIGMA_ENV_B64"
            exit 1
          fi
          echo "$VSIGMA_ENV_B64" | base64 --decode > .env
          chmod 600 .env
          echo ".env restored ($(wc -l < .env) lines)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Compute window + mode (UTC)
        id: win
        run: |
          DAYS="${{ github.event.inputs.days_ahead || '1' }}"
          WH="${{ github.event.inputs.within_hours || '6' }}"
          MODE="${{ github.event.inputs.mode }}"
          SCHED="${{ github.event.schedule }}"
          # Scheduled runs carry no inputs: 08:00 cron = morning briefing, others = pre-KO.
          if [ -z "$MODE" ]; then
            if [ "$SCHED" = "0 8 * * *" ]; then MODE="morning"; else MODE="preko"; fi
          fi
          FROM="$(date -u +%Y-%m-%d)"
          if [ "$MODE" = "preko" ]; then
            TO="$(date -u -d '+1 day' +%Y-%m-%d)"            # cubre saques que cruzan medianoche
            CARD_ARGS="--within-hours $WH"
            RENDER_ARGS="--show-lineups --within-hours $WH"
            TITLE="Mundial 2026 — pre-saque ($FROM)"
          else
            TO="$(date -u -d "+${DAYS} days" +%Y-%m-%d)"
            CARD_ARGS=""
            RENDER_ARGS="--show-yesterday"     # briefing añade 'cómo acertamos ayer'
            TITLE="Mundial 2026 — briefing ($FROM)"
          fi
          {
            echo "from=$FROM"; echo "to=$TO"; echo "mode=$MODE";
            echo "card_args=$CARD_ARGS"; echo "render_args=$RENDER_ARGS"; echo "title=$TITLE";
          } >> "$GITHUB_OUTPUT"
          echo "mode=$MODE  window $FROM..$TO  card_args=[$CARD_ARGS]"

      - name: Build market+L3 cards (fresh odds; pre-KO adds closing line + lineups)
        run: |
          python analysis/worldcup/build_worldcup_cards.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            ${{ steps.win.outputs.card_args }}

      - name: Log today's predictions (pre-match, dedup by fixture)
        run: python analysis/worldcup/worldcup_learning_loop.py log

      - name: Settle finished fixtures (cached /fixtures, ~0 marginal API)
        run: python analysis/worldcup/worldcup_learning_loop.py settle

      - name: Build accumulated track-record scorecard
        run: |
          python analysis/worldcup/worldcup_learning_loop.py scorecard
          echo "----- scorecard preview -----"
          cat analysis/worldcup/worldcup_scorecard.txt

      - name: Render compact Telegram card (track record; morning adds 'ayer', pre-KO lineups)
        id: render
        run: |
          python analysis/worldcup/build_worldcup_full_card.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            --limit "${{ github.event.inputs.limit || '10' }}" --compact \
            --scorecard analysis/worldcup/worldcup_scorecard.txt \
            --log analysis/worldcup/worldcup_predictions_log.csv \
            ${{ steps.win.outputs.render_args }}
          echo "----- message preview -----"
          cat analysis/worldcup/worldcup_full_cards.txt
          # anti-spam gate: number of fixtures in the message (today/imminent).
          N="$(cat analysis/worldcup/worldcup_render_meta.txt 2>/dev/null || echo 0)"
          if [ "${N:-0}" -gt 0 ]; then echo "has_fixtures=true" >> "$GITHUB_OUTPUT";
          else echo "has_fixtures=false" >> "$GITHUB_OUTPUT"; fi
          echo "rendered fixtures: ${N:-0}"

      # ANTI-SPAM: MORNING siempre envía (briefing). PRE-KO solo si hay >=1 partido.
      - name: Send to Telegram
        if: ${{ steps.win.outputs.mode == 'morning' || steps.render.outputs.has_fixtures == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/dispatch_telegram_alert.py \
            --title "${{ steps.win.outputs.title }}" \
            --date "${{ steps.win.outputs.from }}" \
            --body-file analysis/worldcup/worldcup_full_cards.txt

      - name: Persist learning-loop outputs (log + scorecard ONLY)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # EXPLICIT paths only — never `git add .`, never any other file.
          git add analysis/worldcup/worldcup_predictions_log.csv \
                  analysis/worldcup/worldcup_scorecard.txt
          if git diff --cached --quiet; then
            echo "learning loop: no changes to commit."
          else
            git commit -m "vSIGMA World Cup learning loop ${{ steps.win.outputs.from }} [skip ci]"
            # Robust push: the betting pipeline commits often; rebase + retry to avoid
            # losing the accumulated track record on a non-fast-forward race.
            pushed=0
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { pushed=1; break; }
              echo "push retry $i failed; re-syncing..."
              sleep 5
            done
            if [ "$pushed" != "1" ]; then
              echo "::warning::learning loop push failed after retries (notification already sent)."
            fi
          fi
