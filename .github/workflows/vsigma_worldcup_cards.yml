name: vSIGMA World Cup Cards (Telegram)

# ISOLATED notification + learning-loop workflow. Does NOT touch the betting pipeline /
# production workflows / their scripts. PURIFIED: the card shows ONLY our own Layer-3
# model — real data, ZERO market/odds. It builds the L3 card, LOGS today's predictions,
# SETTLES finished fixtures, builds a track-record SCORECARD (L3/v2 vs real + base-rate),
# sends to Telegram, and commits ONLY the log + scorecard back (explicit paths, never
# `git add .`).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo: morning (preview día completo) | preko (solo inminentes + alineaciones)"
        required: false
        type: choice
        default: "morning"
        options: ["morning", "preko"]
      days_ahead:
        description: "MORNING: días hacia delante (ventana hoy..hoy+N, UTC)"
        required: false
        default: "1"
      within_hours:
        description: "PRE-KO: enviar solo partidos que arrancan en las próximas N horas"
        required: false
        default: "6"
      limit:
        description: "Máximo de partidos en el mensaje"
        required: false
        default: "10"

  # SCHEDULE — ACTIVO (UTC). El briefing de mañana (08:00) es el ENVÍO PRINCIPAL.
  # Ya NO hay cuota de cierre (modelo puro L3, sin mercado), así que los refrescos PRE-KO
  # quedan COMENTADOS. El modo preko sigue disponible a mano (workflow_dispatch) para ver
  # inminentes + alineaciones; descomenta los cron de abajo si quieres reactivarlos.
  schedule:
    - cron: "0 8 * * *"     # 08:00 UTC (09:00 Canarias) — briefing día completo (PRINCIPAL)
  # Refrescos PRE-KO desactivados (sin cuota fresca ya no aportan línea de cierre):
  #   - cron: "0 16 * * *"   # 16:00 UTC — pre-KO (alineaciones)
  #   - cron: "0 19 * * *"   # 19:00 UTC — pre-KO (alineaciones)
  #   - cron: "0 22 * * *"   # 22:00 UTC — pre-KO (alineaciones)
  #   - cron: "0 1 * * *"    # 01:00 UTC — pre-KO (sesión nocturna)

# contents: write SOLO para commitear el log + scorecard de aprendizaje (rutas explícitas).
permissions:
  contents: write

concurrency:
  group: vsigma-worldcup-cards
  cancel-in-progress: false

jobs:
  send-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore .env from GitHub Secret
        env:
          VSIGMA_ENV_B64: ${{ secrets.VSIGMA_ENV_B64 }}
        run: |
          if [ -z "$VSIGMA_ENV_B64" ]; then
            echo "::error::Missing secret VSIGMA_ENV_B64"
            exit 1
          fi
          echo "$VSIGMA_ENV_B64" | base64 --decode > .env
          chmod 600 .env
          echo ".env restored ($(wc -l < .env) lines)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Compute window + mode (UTC)
        id: win
        run: |
          DAYS="${{ github.event.inputs.days_ahead || '1' }}"
          WH="${{ github.event.inputs.within_hours || '6' }}"
          MODE="${{ github.event.inputs.mode }}"
          SCHED="${{ github.event.schedule }}"
          # Scheduled runs carry no inputs: 08:00 cron = morning briefing, others = pre-KO.
          if [ -z "$MODE" ]; then
            if [ "$SCHED" = "0 8 * * *" ]; then MODE="morning"; else MODE="preko"; fi
          fi
          FROM="$(date -u +%Y-%m-%d)"
          # WIDE logging window (coverage margin): back 1 day, forward 3 days. Independent of
          # the narrow Telegram window so a missed daily run still logs upcoming fixtures pre-KO.
          LOG_FROM="$(date -u -d '-1 day' +%Y-%m-%d)"
          LOG_TO="$(date -u -d '+3 days' +%Y-%m-%d)"
          if [ "$MODE" = "preko" ]; then
            TO="$(date -u -d '+1 day' +%Y-%m-%d)"            # cubre saques que cruzan medianoche
            CARD_ARGS="--within-hours $WH"
            RENDER_ARGS="--show-lineups --within-hours $WH"
            TITLE="Mundial 2026 — pre-saque ($FROM)"
          else
            TO="$(date -u -d "+${DAYS} days" +%Y-%m-%d)"
            CARD_ARGS=""
            RENDER_ARGS="--show-yesterday"     # briefing añade 'cómo acertamos ayer'
            TITLE="Mundial 2026 — briefing ($FROM)"
          fi
          {
            echo "from=$FROM"; echo "to=$TO"; echo "mode=$MODE";
            echo "card_args=$CARD_ARGS"; echo "render_args=$RENDER_ARGS"; echo "title=$TITLE";
            echo "log_from=$LOG_FROM"; echo "log_to=$LOG_TO";
          } >> "$GITHUB_OUTPUT"
          echo "mode=$MODE  window $FROM..$TO  card_args=[$CARD_ARGS]"

      # ---- SETTLE first: finalize finished fixtures so the auto-refit sees the fresh FT ----
      - name: Settle finished fixtures (cached /fixtures, ~0 marginal API)
        run: python analysis/worldcup/worldcup_learning_loop.py settle

      # ---- AUTO-REFIT + GATE + SWAP (Phase 1c): append freshly-settled WC FT -> offline refit
      #      -> anti-corruption GATE (finite, team-count, max|Δ|<=0.60, OOS not worse). If PASS,
      #      SWAP national_elo_layer3_ratings.csv + dataset; if FAIL, keep old ratings + Telegram
      #      alert. Calibration invariant (not rebuilt). Offline, NO API, NO leakage, soft-fail.
      - name: Auto-refit L3 (gate + SWAP; Telegram alert on reject)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python analysis/worldcup/auto_refit_shadow.py --apply
          echo "----- auto-refit report -----"
          cat analysis/worldcup/auto_refit_shadow_report.txt

      # 0b) MAX MODEL (motor en vivo del briefing): refresca worldcup_maxmodel_shadow_predictions.csv
      #     (mx_* point-in-time) + el scorecard A/B vs L3. 0 API (entrena de int. results + sup_pre_l3).
      #     SOFT (continue-on-error): si falla, build_worldcup_cards usa el CSV previo o cae a L3.
      - name: Refresh MAX model predictions + A/B scorecard (shadow engine -> live)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_maxmodel_shadow.py
          echo "----- A/B scorecard (live MAX vs shadow L3) -----"
          cat analysis/worldcup/worldcup_maxmodel_shadow_scorecard.csv || true

      # 1) WIDE build (now with FRESH ratings) to feed the log. LOCK-AT-KO: re-predicts NS
      #    fixtures from the current ratings; started fixtures keep their frozen cache row.
      - name: Build WIDE cards for log coverage ([HOY-1, HOY+3], own model, NO odds)
        run: |
          python analysis/worldcup/build_worldcup_cards.py \
            --from "${{ steps.win.outputs.log_from }}" --to "${{ steps.win.outputs.log_to }}"

      # 2) Log (LOCK-AT-KO): INSERT new + UPDATE NS fixtures with the latest pre-KO prediction,
      #    FREEZE at kickoff (anti-hindsight; never touches result_*/settled). dedup, gaps report.
      - name: Log predictions (lock-at-KO; update NS, freeze at KO)
        run: python analysis/worldcup/worldcup_learning_loop.py log

      # 3) NARROW card (Telegram view) with the fresh ratings (lock-at-KO applies here too).
      - name: Build L3 cards (Telegram view; own model only, NO odds; pre-KO adds lineups)
        run: |
          python analysis/worldcup/build_worldcup_cards.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            ${{ steps.win.outputs.card_args }}

      # 3b) PRE-MATCH enrichment (SEPARATE step, SOFT): h2h + slow per-team lane (cached
      #     7/30/90d). Non-betting only (NO odds/predictions). Never blocks the briefing.
      - name: Enrich fixtures (pre-match; h2h + team lane; cached, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/build_worldcup_enrichment.py prematch

      # POST-FT enrichment (SEPARATE step, SOFT): full statistics (incl. real xG) + events +
      #   players for settled fixtures. Store-guarded + cached "forever" -> ~0 API on re-runs.
      - name: Enrich fixtures (post-FT; statistics/events/players; store-guarded, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/build_worldcup_enrichment.py postft

      - name: Build accumulated track-record scorecard
        run: |
          python analysis/worldcup/worldcup_learning_loop.py scorecard
          echo "----- scorecard preview -----"
          cat analysis/worldcup/worldcup_scorecard.txt

      # ---- MARCADOR ACUMULADO mx vs L3 (read-only): mide el A/B invertido EN VIVO leyendo el log
      #      (l3_*/mx_* congelados al saque + result_* liquidados). Anti-hindsight: solo partidos que
      #      mx predijo pre-KO. NO recalcula predicciones, NO toca el modelo, NO mercado. Alimenta el
      #      panel + la línea compacta del briefing. SOFT: un fallo NUNCA bloquea el briefing.
      - name: Marcador mx vs L3 (read-only; alimenta panel + briefing)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_mx_vs_l3_scorer.py
          echo "----- mx-vs-L3 marker -----"
          cat analysis/worldcup/worldcup_mx_vs_l3_scorecard.txt || true

      # ---- CORRECCIÓN DE NIVEL auto-aprendida (córners/tiros MOSTRADOS): estima el sesgo desde los
      #      partidos liquidados (encogido ×N/(N+25), cap) y guarda el estado. Se re-estima sola cada
      #      día = auto-aprendizaje. SOLO afecta el valor MOSTRADO de la ficha (display, en memoria);
      #      el log queda en CRUDO. Reversible (flag STATS_LEVEL_CORRECTION). Tarjetas EXCLUIDAS, NO
      #      toca 1X2/goles/props, NO mercado. SOFT: sin datos -> sin corrección, briefing intacto.
      - name: Corrección de nivel stats (estima + guarda estado; read-only sobre modelo)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_stats_level_correction.py
          echo "----- stats-level correction state -----"
          cat analysis/worldcup/worldcup_stats_level_correction.csv || true

      # ---- MARCADOR ACUMULADO STATS POR EQUIPO (read-only): córners/tiros/tarjetas predicho vs real
      #      leyendo el log (st_*_total congelados al saque + result_* liquidados, mismo dato que las
      #      líneas [REAL]). Anti-hindsight: predicción pre-KO, nunca recalculada. MAE/RMSE/sesgo CRUDO
      #      y CORREGIDO (lee el estado de la corrección) + acierto de línea O/U (córners). NO recalcula
      #      predicciones, NO toca el modelo, NO mercado. Alimenta el panel. SOFT: nunca bloquea.
      - name: Marcador stats por equipo (read-only; sesgo crudo vs corregido; alimenta panel)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_team_stats_scorer.py
          echo "----- team-stats marker -----"
          cat analysis/worldcup/worldcup_team_stats_scorecard.txt || true

      # ---- CALIBRATION MONITOR (safety net): after settle+auto-refit+scorecard, check the LIVE
      #      1X2 calibration of the production L3 and alert on Telegram if it drifts. Monitor ONLY:
      #      does NOT touch the model/ratings/calibration/briefing — just reads the log + alerts.
      #      Soft-fail: a failure NEVER blocks the briefing. NO betting endpoints.
      - name: Calibration monitor (alert-only; soft-fail)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python analysis/worldcup/worldcup_calibration_monitor.py
          echo "----- calibration monitor -----"
          cat analysis/worldcup/worldcup_calibration_monitor.txt || true

      - name: Render paginated Telegram messages (header + match pages; morning adds 'ayer')
        id: render
        run: |
          python analysis/worldcup/build_worldcup_full_card.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            --limit "${{ github.event.inputs.limit || '10' }}" --paginate --per-page 2 \
            --scorecard analysis/worldcup/worldcup_scorecard.txt \
            --log analysis/worldcup/worldcup_predictions_log.csv \
            ${{ steps.win.outputs.render_args }}
          echo "----- combined preview (all messages) -----"
          cat analysis/worldcup/worldcup_full_cards.txt
          # anti-spam: the manifest holds one 'path|title' line per message to send.
          # morning -> >=1 (header always); pre-KO with no fixtures -> empty -> send nothing.
          MAN="analysis/worldcup/worldcup_messages_manifest.txt"
          N="$(grep -c . "$MAN" 2>/dev/null || echo 0)"
          if [ "${N:-0}" -gt 0 ]; then echo "has_messages=true" >> "$GITHUB_OUTPUT";
          else echo "has_messages=false" >> "$GITHUB_OUTPUT"; fi
          echo "messages to send: ${N:-0}"

      # ANTI-SPAM: envía solo si el manifest tiene mensajes (vacío en pre-KO sin partidos).
      # UNA llamada al dispatcher POR MENSAJE (dispatcher compartido, NO modificado).
      - name: Send to Telegram (one message per page)
        if: ${{ steps.render.outputs.has_messages == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MAN="analysis/worldcup/worldcup_messages_manifest.txt"
          while IFS='|' read -r f t; do
            [ -z "$f" ] && continue
            echo "-> $t"
            python scripts/dispatch_telegram_alert.py \
              --title "$t" \
              --date "${{ steps.win.outputs.from }}" \
              --body-file "$f"
            sleep 1   # gentle pacing so Telegram doesn't rate-limit the burst
          done < "$MAN"

      # ---- PLAYER PROPS (SHADOW): isolated, AFTER the briefing already went out. NEVER shown
      #      on Telegram / in the ficha. predict (NS, anti-hindsight) -> settle (FT) -> scorecard.
      #      All soft-fail (continue-on-error): a failure NEVER blocks or touches the briefing.
      #      API store-guarded + cached "forever" (raw caches in data/processed -> gitignored).
      - name: Player props — predict (NS, shadow, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/worldcup_player_props.py predict

      - name: Player props — settle finished (shadow, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/worldcup_player_props.py settle

      # ---- CORRECCIÓN de la prop de TARJETA (auto-aprendida, reversible): estima desde los liquidados
      #      el factor de deflación de p_card (la tarjeta sale sesgada ALTA) y guarda el estado. Se
      #      re-estima sola cada día. SOLO afecta el valor MOSTRADO de la ficha (display); el log queda
      #      en CRUDO. Reversible (flag CARD_PROP_CORRECTION). Gol/asistencia NO se tocan; sin mercado.
      #      Corre tras el settle de props para usar el dato más fresco. SOFT: sin datos -> sin corrección.
      - name: Corrección prop de tarjeta (estima + guarda estado; read-only sobre modelo)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_card_prop_correction.py
          echo "----- card-prop correction state -----"
          cat analysis/worldcup/worldcup_card_prop_correction.csv || true

      - name: Player props — scorecard (shadow, soft-fail)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_player_props.py scorecard
          echo "----- player props scorecard -----"
          cat analysis/worldcup/worldcup_player_props_scorecard.txt || true

      # ---- PLAYER-EVENTS Fase 2: REAL fixture-events extractor (/fixtures/events from the post-FT
      #      store) -> clean per-event table (goals/assists/cards/penalties/subs). Read-only, NO market,
      #      NO betting, no fabrication. Feeds the per-player history (penalties, last taker, cards).
      - name: Player-events — real fixture-events extractor (Fase 2, soft)
        continue-on-error: true
        run: |
          python analysis/worldcup/build_worldcup_fixture_events.py
          echo "----- fixture events (head) -----"
          head -15 analysis/worldcup/worldcup_fixture_events.csv || true

      # ---- FASE 4A/4B external-data preparer (read-only inputs, NO API, NO scraping, NO fabrication):
      #      create-if-missing the data/external/*.csv contracts AND run a SAFE INCREMENTAL MERGE that
      #      pre-populates ONLY from REAL repo data — penalty takers from real events (attempts/rank/
      #      last_date aggregated + refreshed), player position (fine from a lineup source if present,
      #      else coarse), fixture referee + venue IF they appear in the store. NEVER deletes rows,
      #      never overwrites a manual edit; xG/xA, coach, referee profiles, weather measurements stay
      #      EMPTY for manual entry. Runs AFTER the fixture-events extractor (its input) and BEFORE
      #      Fase 3 so the adapters pick up any newly-merged rows.
      - name: Fase 4A/4B — prepare + incrementally merge external data (safe, soft-fail)
        continue-on-error: true
        run: |
          python analysis/worldcup/prepare_worldcup_external_templates.py

      # ---- FASE 3 external-data status (read-only, NO API, NO secrets): logs which optional CSV
      #      sources under data/external/ are active for this run (xG/xA real, set-piece takers,
      #      referee, weather, coach tactical, positional). Pure diagnostics; never blocks. Absent
      #      sources simply degrade downstream to data_quality/confidence/reason (no fabrication).
      - name: Fase 3 — external-data adapters status (read-only, soft-fail)
        continue-on-error: true
        run: |
          python -c "import sys; sys.path.insert(0,'analysis/players'); import player_data_adapters as a; import json; print('external_data_status:', json.dumps(a.external_data_status())); print('adapters_status:', json.dumps(a.adapters_status()))"

      # ---- PLAYER & INDIVIDUAL-EVENTS module: builds the §11 structured player predictions (likely
      #      scorers / shots-on-target / assisters, set-piece takers, card risk, matchups, two-XI
      #      scenario) + the per-player history artifact, with honest data_quality/confidence/reason
      #      (NO fabrication). FASE 3 enrichment (active only if you drop the matching file in
      #      data/external/): real xG/xA per player (source_used=real_xg_xa vs proxy), set_piece_takers
      #      with documented source priority, referee/weather/coach contexts + individual matchups, all
      #      surfaced in external_data_status. Pure football, NO market/odds/betting. SOFT.
      - name: Player-events card + history (read-only; §11 + Fase 3 external context)
        continue-on-error: true
        run: |
          python analysis/worldcup/build_worldcup_player_events.py
          echo "----- player-events (flat) -----"
          head -20 analysis/worldcup/worldcup_player_events.csv || true
          echo "----- player history (head) -----"
          head -10 analysis/worldcup/worldcup_player_event_history.csv || true

      # PLAYER-EVENTS Telegram report (§13): PURE football prediction per fixture (NO betting language,
      # asserted at build time). One message per fixture via the shared dispatcher (NOT modified).
      - name: Player-events Telegram report (build + send; pure football, no betting)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python analysis/worldcup/build_worldcup_player_events_telegram.py
          MAN="analysis/worldcup/worldcup_player_events_messages_manifest.txt"
          N="$(grep -c . "$MAN" 2>/dev/null || echo 0)"
          echo "player-events messages: ${N:-0}"
          if [ "${N:-0}" -gt 0 ]; then
            while IFS='|' read -r f t; do
              [ -z "$f" ] && continue
              echo "-> $t"
              python scripts/dispatch_telegram_alert.py \
                --title "$t" \
                --date "${{ steps.win.outputs.from }}" \
                --body-file "$f"
              sleep 1
            done < "$MAN"
          fi

      # ---- CONTEXT-ADJUSTMENT (SHADOW): qualification-scenario nudge vs pure L3. ISOLATED,
      #      NEVER shown on Telegram / in the ficha. predict (NS, anti-hindsight, lock-at-KO) ->
      #      settle (FT) -> scorecard (context-adjusted vs L3, only over NON-TRIVIAL scenarios).
      #      All soft-fail: a failure NEVER blocks or touches the briefing / L3 / props. /standings
      #      store-guarded; settle reuses the cached /fixtures. NO betting endpoints.
      - name: Context shadow — predict (NS, shadow, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/worldcup_context_shadow.py predict

      - name: Context shadow — settle finished (shadow, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/worldcup_context_shadow.py settle

      - name: Context shadow — scorecard (shadow, soft-fail)
        continue-on-error: true
        run: |
          python analysis/worldcup/worldcup_context_shadow.py scorecard
          echo "----- context shadow scorecard -----"
          cat analysis/worldcup/worldcup_context_shadow_scorecard.txt || true

      # ---- CONSOLIDATED TRACK-RECORD PANEL: read-only digest of the scorecards above into ONE
      #      Markdown file. Display/report only — does NOT recompute predictions, does NOT touch the
      #      model. Soft-fail (continue-on-error): a failure NEVER blocks the briefing or the commit.
      - name: Build consolidated track-record panel (read-only, soft-fail)
        continue-on-error: true
        run: |
          python analysis/worldcup/build_worldcup_trackrecord_panel.py
          echo "----- track-record panel preview -----"
          cat analysis/worldcup/worldcup_trackrecord_panel.md || true

      - name: Persist learning-loop outputs (log + scorecard + ratings + dataset + cache + report)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # EXPLICIT paths only — never `git add .`, never any other file.
          git add analysis/worldcup/worldcup_predictions_log.csv \
                  analysis/worldcup/worldcup_scorecard.txt
          # auto-refit outputs (Phase 1c SWAP): ratings + training data + L3 cache + report.
          # Each guarded — only added if present (ratings/dataset change only when the gate swaps).
          for p in analysis/worldcup/national_elo_layer3_ratings.csv \
                   analysis/worldcup/international_results.csv \
                   analysis/worldcup/worldcup_our_model_predictions.csv \
                   analysis/worldcup/auto_refit_shadow_report.txt \
                   analysis/worldcup/worldcup_player_props_log.csv \
                   analysis/worldcup/worldcup_player_props_scorecard.txt \
                   analysis/worldcup/worldcup_card_prop_correction.csv \
                   analysis/worldcup/worldcup_player_events.json \
                   analysis/worldcup/worldcup_player_events.csv \
                   analysis/worldcup/worldcup_fixture_events.csv \
                   analysis/worldcup/worldcup_player_event_history.csv \
                   analysis/worldcup/worldcup_context_shadow_log.csv \
                   analysis/worldcup/worldcup_context_shadow_scorecard.txt \
                   analysis/worldcup/worldcup_calibration_monitor.txt \
                   analysis/worldcup/worldcup_calibration_monitor_state.json \
                   analysis/worldcup/worldcup_maxmodel_shadow_predictions.csv \
                   analysis/worldcup/worldcup_maxmodel_shadow_scorecard.csv \
                   analysis/worldcup/worldcup_mx_vs_l3_scorecard.txt \
                   analysis/worldcup/worldcup_mx_vs_l3_scorecard.csv \
                   analysis/worldcup/worldcup_team_stats_scorecard.txt \
                   analysis/worldcup/worldcup_team_stats_scorecard.csv \
                   analysis/worldcup/worldcup_stats_level_correction.csv \
                   analysis/worldcup/worldcup_trackrecord_panel.md; do
            [ -f "$p" ] && git add "$p" || true
          done
          # gaps file only exists once a coverage gap has been detected (explicit path)
          [ -f analysis/worldcup/worldcup_gaps.txt ] && \
            git add analysis/worldcup/worldcup_gaps.txt || true
          if git diff --cached --quiet; then
            echo "learning loop: no changes to commit."
          else
            git commit -m "vSIGMA World Cup learning loop ${{ steps.win.outputs.from }} [skip ci]"
            # Robust push: the betting pipeline commits often; rebase + retry to avoid
            # losing the accumulated track record on a non-fast-forward race.
            pushed=0
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { pushed=1; break; }
              echo "push retry $i failed; re-syncing..."
              sleep 5
            done
            if [ "$pushed" != "1" ]; then
              echo "::warning::learning loop push failed after retries (notification already sent)."
            fi
          fi
