name: vSIGMA World Cup Cards (Telegram)

# ISOLATED notification + learning-loop workflow. Does NOT touch the betting pipeline /
# production workflows / their scripts. PURIFIED: the card shows ONLY our own Layer-3
# model — real data, ZERO market/odds. It builds the L3 card, LOGS today's predictions,
# SETTLES finished fixtures, builds a track-record SCORECARD (L3/v2 vs real + base-rate),
# sends to Telegram, and commits ONLY the log + scorecard back (explicit paths, never
# `git add .`).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo: morning (preview día completo) | preko (solo inminentes + alineaciones)"
        required: false
        type: choice
        default: "morning"
        options: ["morning", "preko"]
      days_ahead:
        description: "MORNING: días hacia delante (ventana hoy..hoy+N, UTC)"
        required: false
        default: "1"
      within_hours:
        description: "PRE-KO: enviar solo partidos que arrancan en las próximas N horas"
        required: false
        default: "6"
      limit:
        description: "Máximo de partidos en el mensaje"
        required: false
        default: "10"

  # SCHEDULE — ACTIVO (UTC). El briefing de mañana (08:00) es el ENVÍO PRINCIPAL.
  # Ya NO hay cuota de cierre (modelo puro L3, sin mercado), así que los refrescos PRE-KO
  # quedan COMENTADOS. El modo preko sigue disponible a mano (workflow_dispatch) para ver
  # inminentes + alineaciones; descomenta los cron de abajo si quieres reactivarlos.
  schedule:
    - cron: "0 8 * * *"     # 08:00 UTC (09:00 Canarias) — briefing día completo (PRINCIPAL)
  # Refrescos PRE-KO desactivados (sin cuota fresca ya no aportan línea de cierre):
  #   - cron: "0 16 * * *"   # 16:00 UTC — pre-KO (alineaciones)
  #   - cron: "0 19 * * *"   # 19:00 UTC — pre-KO (alineaciones)
  #   - cron: "0 22 * * *"   # 22:00 UTC — pre-KO (alineaciones)
  #   - cron: "0 1 * * *"    # 01:00 UTC — pre-KO (sesión nocturna)

# contents: write SOLO para commitear el log + scorecard de aprendizaje (rutas explícitas).
permissions:
  contents: write

concurrency:
  group: vsigma-worldcup-cards
  cancel-in-progress: false

jobs:
  send-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore .env from GitHub Secret
        env:
          VSIGMA_ENV_B64: ${{ secrets.VSIGMA_ENV_B64 }}
        run: |
          if [ -z "$VSIGMA_ENV_B64" ]; then
            echo "::error::Missing secret VSIGMA_ENV_B64"
            exit 1
          fi
          echo "$VSIGMA_ENV_B64" | base64 --decode > .env
          chmod 600 .env
          echo ".env restored ($(wc -l < .env) lines)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Compute window + mode (UTC)
        id: win
        run: |
          DAYS="${{ github.event.inputs.days_ahead || '1' }}"
          WH="${{ github.event.inputs.within_hours || '6' }}"
          MODE="${{ github.event.inputs.mode }}"
          SCHED="${{ github.event.schedule }}"
          # Scheduled runs carry no inputs: 08:00 cron = morning briefing, others = pre-KO.
          if [ -z "$MODE" ]; then
            if [ "$SCHED" = "0 8 * * *" ]; then MODE="morning"; else MODE="preko"; fi
          fi
          FROM="$(date -u +%Y-%m-%d)"
          # WIDE logging window (coverage margin): back 1 day, forward 3 days. Independent of
          # the narrow Telegram window so a missed daily run still logs upcoming fixtures pre-KO.
          LOG_FROM="$(date -u -d '-1 day' +%Y-%m-%d)"
          LOG_TO="$(date -u -d '+3 days' +%Y-%m-%d)"
          if [ "$MODE" = "preko" ]; then
            TO="$(date -u -d '+1 day' +%Y-%m-%d)"            # cubre saques que cruzan medianoche
            CARD_ARGS="--within-hours $WH"
            RENDER_ARGS="--show-lineups --within-hours $WH"
            TITLE="Mundial 2026 — pre-saque ($FROM)"
          else
            TO="$(date -u -d "+${DAYS} days" +%Y-%m-%d)"
            CARD_ARGS=""
            RENDER_ARGS="--show-yesterday"     # briefing añade 'cómo acertamos ayer'
            TITLE="Mundial 2026 — briefing ($FROM)"
          fi
          {
            echo "from=$FROM"; echo "to=$TO"; echo "mode=$MODE";
            echo "card_args=$CARD_ARGS"; echo "render_args=$RENDER_ARGS"; echo "title=$TITLE";
            echo "log_from=$LOG_FROM"; echo "log_to=$LOG_TO";
          } >> "$GITHUB_OUTPUT"
          echo "mode=$MODE  window $FROM..$TO  card_args=[$CARD_ARGS]"

      # 1) WIDE build only to feed the log (coverage margin). NOT shown on Telegram.
      - name: Build WIDE cards for log coverage ([HOY-1, HOY+3], own model, NO odds)
        run: |
          python analysis/worldcup/build_worldcup_cards.py \
            --from "${{ steps.win.outputs.log_from }}" --to "${{ steps.win.outputs.log_to }}"

      # 2) Log over the wide window: pre-match only (anti-hindsight guard), dedup lock-first,
      #    writes worldcup_gaps.txt for any finished-before-logged miss. NO API, NO Telegram.
      - name: Log predictions over wide window (pre-match only, dedup, gaps report)
        run: python analysis/worldcup/worldcup_learning_loop.py log

      # 3) Rebuild the NARROW card (original args) -> this is what settle/scorecard/render see,
      #    so the Telegram message is byte-for-byte unchanged vs before this fix.
      - name: Build L3 cards (Telegram view; own model only, NO odds; pre-KO adds lineups)
        run: |
          python analysis/worldcup/build_worldcup_cards.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            ${{ steps.win.outputs.card_args }}

      # 3b) PRE-MATCH enrichment (SEPARATE step, SOFT): h2h + slow per-team lane (cached
      #     7/30/90d). Non-betting only (NO odds/predictions). Never blocks the briefing.
      - name: Enrich fixtures (pre-match; h2h + team lane; cached, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/build_worldcup_enrichment.py prematch

      - name: Settle finished fixtures (cached /fixtures, ~0 marginal API)
        run: python analysis/worldcup/worldcup_learning_loop.py settle

      # POST-FT enrichment (SEPARATE step, SOFT): full statistics (incl. real xG) + events +
      #   players for settled fixtures. Store-guarded + cached "forever" -> ~0 API on re-runs.
      - name: Enrich fixtures (post-FT; statistics/events/players; store-guarded, soft-fail)
        continue-on-error: true
        run: python analysis/worldcup/build_worldcup_enrichment.py postft

      - name: Build accumulated track-record scorecard
        run: |
          python analysis/worldcup/worldcup_learning_loop.py scorecard
          echo "----- scorecard preview -----"
          cat analysis/worldcup/worldcup_scorecard.txt

      - name: Render paginated Telegram messages (header + match pages; morning adds 'ayer')
        id: render
        run: |
          python analysis/worldcup/build_worldcup_full_card.py \
            --from "${{ steps.win.outputs.from }}" --to "${{ steps.win.outputs.to }}" \
            --limit "${{ github.event.inputs.limit || '10' }}" --paginate --per-page 3 \
            --scorecard analysis/worldcup/worldcup_scorecard.txt \
            --log analysis/worldcup/worldcup_predictions_log.csv \
            ${{ steps.win.outputs.render_args }}
          echo "----- combined preview (all messages) -----"
          cat analysis/worldcup/worldcup_full_cards.txt
          # anti-spam: the manifest holds one 'path|title' line per message to send.
          # morning -> >=1 (header always); pre-KO with no fixtures -> empty -> send nothing.
          MAN="analysis/worldcup/worldcup_messages_manifest.txt"
          N="$(grep -c . "$MAN" 2>/dev/null || echo 0)"
          if [ "${N:-0}" -gt 0 ]; then echo "has_messages=true" >> "$GITHUB_OUTPUT";
          else echo "has_messages=false" >> "$GITHUB_OUTPUT"; fi
          echo "messages to send: ${N:-0}"

      # ANTI-SPAM: envía solo si el manifest tiene mensajes (vacío en pre-KO sin partidos).
      # UNA llamada al dispatcher POR MENSAJE (dispatcher compartido, NO modificado).
      - name: Send to Telegram (one message per page)
        if: ${{ steps.render.outputs.has_messages == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MAN="analysis/worldcup/worldcup_messages_manifest.txt"
          while IFS='|' read -r f t; do
            [ -z "$f" ] && continue
            echo "-> $t"
            python scripts/dispatch_telegram_alert.py \
              --title "$t" \
              --date "${{ steps.win.outputs.from }}" \
              --body-file "$f"
            sleep 1   # gentle pacing so Telegram doesn't rate-limit the burst
          done < "$MAN"

      - name: Persist learning-loop outputs (log + scorecard ONLY)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # EXPLICIT paths only — never `git add .`, never any other file.
          git add analysis/worldcup/worldcup_predictions_log.csv \
                  analysis/worldcup/worldcup_scorecard.txt
          # gaps file only exists once a coverage gap has been detected (explicit path)
          [ -f analysis/worldcup/worldcup_gaps.txt ] && \
            git add analysis/worldcup/worldcup_gaps.txt || true
          if git diff --cached --quiet; then
            echo "learning loop: no changes to commit."
          else
            git commit -m "vSIGMA World Cup learning loop ${{ steps.win.outputs.from }} [skip ci]"
            # Robust push: the betting pipeline commits often; rebase + retry to avoid
            # losing the accumulated track record on a non-fast-forward race.
            pushed=0
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { pushed=1; break; }
              echo "push retry $i failed; re-syncing..."
              sleep 5
            done
            if [ "$pushed" != "1" ]; then
              echo "::warning::learning loop push failed after retries (notification already sent)."
            fi
          fi
