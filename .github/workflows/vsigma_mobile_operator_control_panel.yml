name: vSIGMA Mobile Operator Control Panel

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  schedule:
    - cron: "20 8 * * *"
    - cron: "20 15 * * *"
    - cron: "20 21 * * *"
    - cron: "20 23 * * *"

permissions:
  contents: write

concurrency:
  group: vsigma-mobile-operator-control-panel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
      - name: Build mobile operator control panel
        shell: bash
        run: python scripts/build_mobile_operator_control_panel.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Append shadow AB addendum
        shell: bash
        run: python scripts/append_mobile_panel_shadow_ab_addendum.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Append shadow AB quality gate
        shell: bash
        run: python scripts/append_mobile_panel_ab_quality_gate.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Write run summary
        shell: bash
        run: |
          echo "# vSIGMA Mobile Operator Control Panel" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat data/processed/today/${VSIGMA_DATE}/vsigma_mobile_operator_control_panel.md >> "$GITHUB_STEP_SUMMARY"
      - name: Commit mobile panel
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_mobile_operator_control_panel.* data/processed/governance/vsigma_mobile_operator_control_panel.* 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No mobile operator control panel changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA mobile operator control panel ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
