name: vSIGMA Issue Alerts

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  schedule:
    - cron: "55 14 * * *"
    - cron: "55 22 * * *"
    - cron: "55 6 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: vsigma-issue-alerts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"

      - name: Build alert payload
        shell: bash
        run: python scripts/build_issue_alert_payload.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Commit alert payload and state
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_issue_alert_* data/processed/governance/vsigma_issue_alert_* data/processed/ledger/vsigma_alert_state.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No alert payload/state changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA issue alert payload ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main

      - name: Create or update GitHub issue if needed
        shell: bash
        run: |
          REQUIRED="$(cat data/processed/today/${VSIGMA_DATE}/vsigma_issue_alert_required.txt)"
          NOTIFY="$(cat data/processed/today/${VSIGMA_DATE}/vsigma_issue_alert_notify_required.txt)"
          TITLE="$(cat data/processed/today/${VSIGMA_DATE}/vsigma_issue_alert_title.txt)"
          BODY_FILE="data/processed/today/${VSIGMA_DATE}/vsigma_issue_alert_body.md"
          echo "required=${REQUIRED}"
          echo "notify=${NOTIFY}"
          echo "title=${TITLE}"
          if [ "$REQUIRED" != "true" ]; then
            echo "No issue alert required."
            exit 0
          fi
          gh label create vsigma-alert --color B60205 --description "vSIGMA automated alert" 2>/dev/null || true
          EXISTING="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            echo "Issue already exists: #$EXISTING"
            if [ "$NOTIFY" = "true" ]; then
              gh issue comment "$EXISTING" --body-file "$BODY_FILE"
            else
              echo "No material alert change; skipping comment."
            fi
            exit 0
          fi
          gh issue create --title "$TITLE" --body-file "$BODY_FILE" --label vsigma-alert
