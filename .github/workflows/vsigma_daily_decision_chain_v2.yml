name: vSIGMA Daily Decision Chain v2

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
      include_backtest:
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: vsigma-daily-decision-chain-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
      AZURE_BING_SEARCH_KEY: ${{ secrets.AZURE_BING_SEARCH_KEY }}
      APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
      API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      X_RAPIDAPI_KEY: ${{ secrets.X_RAPIDAPI_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install requests
          fi

      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ] && [ -f ".vsigma/triggers/daily_chain_self_heal.trigger" ]; then
            D="$(grep -E '^date=' .vsigma/triggers/daily_chain_self_heal.trigger | tail -1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$D" ] && [ -f ".vsigma/triggers/daily_decision_chain_v2.trigger" ]; then
            D="$(grep -E '^date=' .vsigma/triggers/daily_decision_chain_v2.trigger | tail -1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          INCLUDE_BACKTEST="${{ github.event.inputs.include_backtest }}"
          if [ -z "$INCLUDE_BACKTEST" ] && [ -f ".vsigma/triggers/daily_chain_self_heal.trigger" ]; then
            INCLUDE_BACKTEST="$(grep -E '^include_backtest=' .vsigma/triggers/daily_chain_self_heal.trigger | tail -1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$INCLUDE_BACKTEST" ] && [ -f ".vsigma/triggers/daily_decision_chain_v2.trigger" ]; then
            INCLUDE_BACKTEST="$(grep -E '^include_backtest=' .vsigma/triggers/daily_decision_chain_v2.trigger | tail -1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$INCLUDE_BACKTEST" ]; then INCLUDE_BACKTEST="false"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
          echo "INCLUDE_BACKTEST=$INCLUDE_BACKTEST" >> "$GITHUB_ENV"

      - name: Normalize daily trigger dates
        shell: python
        run: |
          from pathlib import Path
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          triggers = Path(".vsigma/triggers")
          triggers.mkdir(parents=True, exist_ok=True)

          day = os.environ["VSIGMA_DATE"]
          include_backtest = os.environ.get("INCLUDE_BACKTEST", "false") or "false"
          run_id = os.environ.get("GITHUB_RUN_ID", "local")
          now = datetime.now(ZoneInfo("Atlantic/Canary")).isoformat(timespec="seconds")

          files = {
              "daily_decision_chain_v2.trigger": (
                  f"date={day}\n"
                  f"include_backtest={include_backtest}\n"
                  "requested_by=github-actions\n"
                  "reason=normalize_daily_decision_chain_v2_date\n"
                  f"triggered_at={now}\n"
                  f"nonce=daily-v2-{day}-{run_id}\n"
              ),
              "daily_chain_self_heal.trigger": (
                  f"date={day}\n"
                  f"include_backtest={include_backtest}\n"
                  "requested_by=github-actions\n"
                  "reason=normalize_daily_chain_self_heal_date\n"
                  f"triggered_at={now}\n"
                  f"nonce=self-heal-{day}-{run_id}\n"
              ),
              "prelock_official_lineup_recheck.trigger": (
                  f"date={day}\n"
                  "include_operator_brief=true\n"
                  "requested_by=github-actions\n"
                  "reason=normalize_prelock_recheck_date\n"
                  f"triggered_at={now}\n"
                  f"nonce=prelock-{day}-{run_id}\n"
              ),
          }

          for name, content in files.items():
              (triggers / name).write_text(content, encoding="utf-8")

      - name: Preflight self-heal router
        shell: bash
        run: python scripts/route_daily_chain_missing_self_heal.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build daily reports
        shell: bash
        run: |
          python scripts/build_scored_to_real_shortlist.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_real_objective_context_gate.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_objective_context_execution_bridge.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_objective_availability_gate.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_context_adjusted_final_picks.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_context_matrix.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_context_matrix_portfolio.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_match_stat_forecasts.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_forecast_market_translator.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_daily_execution_board.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_probable_lineup_consensus.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/build_fixture_api_coverage_matrix_v3.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
          python scripts/apply_fixture_api_coverage_gate_to_board_v2.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Guarantee board artifact
        shell: python
        run: |
          import csv, os
          from pathlib import Path

          d = os.environ["VSIGMA_DATE"]
          base = Path("data/processed/today") / d
          gov = Path("data/processed/governance")
          base.mkdir(parents=True, exist_ok=True)
          gov.mkdir(parents=True, exist_ok=True)

          md = base / "vsigma_daily_execution_board.md"
          csv_path = base / "vsigma_daily_execution_board.csv"

          if not md.exists():
              md.write_text(
                  f"# vSIGMA Daily Execution Board - {d}\n\n"
                  "## Summary\n"
                  "- rows_on_board: 0\n"
                  "- final_decision_counts: none\n"
                  "- board_bucket_counts: none\n"
                  "- source_guard: SELF_HEAL_DIAGNOSTIC_EMPTY_BOARD\n"
                  "- auto_apply: NO\n"
                  "- production_change: NO\n\n"
                  "## Board Rows\n"
                  "- none. Diagnostic board created because build_daily_execution_board did not produce the expected artifact.\n\n"
                  "## Guardrails\n"
                  "- This diagnostic output guarantees the daily board artifact exists.\n"
                  "- Empty board is not pick permission.\n"
                  "- Check upstream translator/forecast files for missing rows.\n",
                  encoding="utf-8",
              )

          if not csv_path.exists():
              fields = [
                  "target_date", "generated_at", "board_rank", "fixture_id", "home_team", "away_team",
                  "final_decision", "board_bucket", "primary_market", "secondary_market", "stake_band",
                  "execution_permission", "portfolio_status", "context_level", "forecast_confidence",
                  "forecast_warning", "translation_score", "kill_switch", "stat_profile", "key_stat_forecast",
                  "prelock_trigger", "live_trigger", "cancel_trigger", "operator_note", "source_guard",
                  "auto_apply", "production_change",
              ]
              with csv_path.open("w", encoding="utf-8", newline="") as f:
                  csv.DictWriter(f, fieldnames=fields).writeheader()

          (gov / "vsigma_daily_execution_board.md").write_text(md.read_text(encoding="utf-8"), encoding="utf-8")
          (gov / "vsigma_daily_execution_board.csv").write_text(csv_path.read_text(encoding="utf-8"), encoding="utf-8")

      - name: Refresh automation health after board guarantee
        shell: bash
        run: python scripts/build_automation_health_monitor.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Refresh operator brief after automation health
        shell: bash
        run: python scripts/build_operator_brief.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build date guard and consolidated panel
        shell: bash
        run: python scripts/build_consolidated_daily_operator_panel_v3.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Integrate API quota gate into panel
        shell: bash
        run: python scripts/build_api_quota_gate_panel_integration.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Refresh date guard after self-heal
        shell: bash
        run: python scripts/build_post_self_heal_date_guard_refresh.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Normalize empty diagnostic board state
        shell: bash
        run: python scripts/build_empty_diagnostic_board_state_normalizer.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Audit rejected source blocks
        shell: bash
        run: python scripts/build_rejected_source_block_audit.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build manual whitelist review board
        shell: bash
        run: python scripts/build_manual_whitelist_review_board.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Declare active max-coverage API policy
        shell: bash
        run: python scripts/build_active_max_coverage_api_policy.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build API subscription guard
        shell: bash
        run: python scripts/build_api_subscription_guard.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Run max-coverage API enrichment executor
        shell: bash
        run: python scripts/run_api_enrichment_with_subscription_guard.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build API-enriched scored candidates
        shell: bash
        run: python scripts/build_api_enriched_scored_candidates.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build promotion input bridge
        shell: bash
        run: python scripts/build_promotion_input_bridge.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build API-enriched promotion gate adapter
        shell: bash
        run: python scripts/build_api_enriched_promotion_gate_adapter.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build API-enriched review board
        shell: bash
        run: python scripts/build_api_enriched_review_board.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Assert API-enriched review board output
        shell: bash
        run: |
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_api_enriched_review_board.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_api_enriched_review_board.csv"

      - name: Build official pick ledger
        shell: bash
        run: python scripts/build_official_pick_ledger.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Postflight self-heal router
        shell: bash
        run: python scripts/route_daily_chain_missing_self_heal.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Final normalize API-enriched text outputs
        shell: bash
        run: python scripts/normalize_api_enriched_text_outputs.py --date "$VSIGMA_DATE"

      - name: Final integrate API-enriched review board into panel
        shell: bash
        run: python scripts/integrate_api_enriched_review_board_into_panel.py --date "$VSIGMA_DATE"

      - name: Assert final API-enriched review board panel section
        shell: bash
        run: grep -q "## API-Enriched Review Board" "data/processed/today/${VSIGMA_DATE}/vsigma_consolidated_daily_operator_panel.md"

      - name: Optional backtest
        if: ${{ env.INCLUDE_BACKTEST == 'true' }}
        shell: bash
        run: python scripts/backtest_match_stat_forecasts.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Commit outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python scripts/normalize_api_enriched_text_outputs.py --date "$VSIGMA_DATE" || true
          python scripts/integrate_api_enriched_review_board_into_panel.py --date "$VSIGMA_DATE" || true
          grep -q "## API-Enriched Review Board" "data/processed/today/${VSIGMA_DATE}/vsigma_consolidated_daily_operator_panel.md" || {
            echo "ERROR: final API-Enriched Review Board section missing before commit"
            exit 1
          }

          git add data/processed/today/${VSIGMA_DATE}/vsigma_* data/processed/governance/vsigma_* 2>/dev/null || true
          git add .vsigma/triggers/daily_decision_chain_v2.trigger .vsigma/triggers/daily_chain_self_heal.trigger .vsigma/triggers/prelock_official_lineup_recheck.trigger 2>/dev/null || true

          git add -f \
            data/processed/today/${VSIGMA_DATE}/vsigma_daily_execution_board.md \
            data/processed/today/${VSIGMA_DATE}/vsigma_daily_execution_board.csv \
            data/processed/governance/vsigma_daily_execution_board.md \
            data/processed/governance/vsigma_daily_execution_board.csv

          echo "Staged changes:"
          git diff --cached --name-only || true

          STAGED_FILES="$(git diff --cached --name-only)"
          if [[ "$STAGED_FILES" != *"vsigma_daily_execution_board"* ]]; then
            echo "ERROR: board not staged"
            echo "$STAGED_FILES"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No vSIGMA daily decision chain changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA daily decision chain v2 ${VSIGMA_DATE} [skip ci]"

          if git push origin HEAD:main; then
            echo "Daily decision outputs pushed successfully."
            exit 0
          fi

          echo "WARNING: failed to push daily decision outputs. Functional pipeline completed; another run may have pushed newer outputs."
          exit 0
