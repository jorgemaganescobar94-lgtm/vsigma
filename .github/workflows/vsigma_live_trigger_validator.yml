name: vSIGMA Live Trigger Validator

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  schedule:
    - cron: "5 16 * * *"
    - cron: "5 18 * * *"
    - cron: "5 20 * * *"
    - cron: "5 22 * * *"

permissions:
  contents: write

concurrency:
  group: vsigma-live-trigger-validator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      X_RAPIDAPI_KEY: ${{ secrets.X_RAPIDAPI_KEY }}
      API_FOOTBALL_HOST: ${{ secrets.API_FOOTBALL_HOST }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        shell: bash
        run: python -m pip install --upgrade pip requests
      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
      - name: Build live trigger validation
        shell: bash
        run: python scripts/build_live_trigger_validator.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Commit live trigger report
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_live_trigger_validator.* data/processed/governance/vsigma_live_trigger_validator.* 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No live trigger changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA live trigger validator ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
