name: vSIGMA Safe Auto PR Generator

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  schedule:
    - cron: "35 8 * * *"

permissions:
  contents: write

concurrency:
  group: vsigma-safe-auto-pr-generator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
      - name: Build safe PR plan
        shell: bash
        run: python scripts/build_safe_auto_pr_generator.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Commit safe PR plan
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_safe_auto_pr_* data/processed/governance/vsigma_safe_auto_pr_* 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No safe PR plan changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA safe auto PR plan ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
