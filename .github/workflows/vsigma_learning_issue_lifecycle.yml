name: vSIGMA Learning Issue Lifecycle

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha YYYY-MM-DD. Vacío = hoy en Atlantic/Canary"
        required: false
        default: ""
  schedule:
    - cron: "10 0 * * *"

permissions:
  contents: write
  issues: read

concurrency:
  group: vsigma-learning-issue-lifecycle-main
  cancel-in-progress: false

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide target date
        shell: bash
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          TODAY="$(TZ=Atlantic/Canary date +%F)"
          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT="$TODAY"
          fi
          echo "VSIGMA_DATE=$DATE_INPUT" >> "$GITHUB_ENV"
          echo "Date: $DATE_INPUT"

      - name: Build learning issue lifecycle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/build_learning_issue_lifecycle.py \
            --date "$VSIGMA_DATE" \
            --timezone Atlantic/Canary \
            --repo "${{ github.repository }}"

      - name: Upload lifecycle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vsigma-learning-issue-lifecycle-${{ env.VSIGMA_DATE }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_learning_issue_lifecycle.*
            data/processed/governance/vsigma_learning_issue_lifecycle.*

      - name: Commit lifecycle outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_learning_issue_lifecycle.* data/processed/governance/vsigma_learning_issue_lifecycle.* 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No lifecycle output changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA issue lifecycle ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
