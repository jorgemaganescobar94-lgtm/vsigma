name: vSIGMA API Shadow Rule Ledger

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  workflow_run:
    workflows:
      - vSIGMA Daily Decision Chain v2
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: vsigma-api-shadow-rule-ledger-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Decide date
        shell: bash
        run: |
          D=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            D="${{ inputs.date }}"
          fi
          if [ -z "$D" ] && [ -f ".vsigma/triggers/daily_decision_chain_v2.trigger" ]; then
            D="$(grep -E '^date=' .vsigma/triggers/daily_decision_chain_v2.trigger | tail -1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
          echo "Resolved VSIGMA_DATE=$D"

      - name: Build API shadow rule outcome ledger
        shell: bash
        run: |
          python -m py_compile scripts/build_api_shadow_rule_outcome_ledger.py
          python scripts/build_api_shadow_rule_outcome_ledger.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build API shadow rule out-of-sample tracker
        shell: bash
        run: |
          python -m py_compile scripts/build_api_shadow_rule_oos_tracker.py
          python scripts/build_api_shadow_rule_oos_tracker.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Assert shadow outputs
        shell: bash
        run: |
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_outcome_ledger.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_outcome_ledger.csv"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_oos_tracker.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_oos_tracker.csv"
          grep -q "NO_PICK_PERMISSION" "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_outcome_ledger.md"
          grep -q "NO_STAKE_PERMISSION" "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_outcome_ledger.md"
          grep -q "NO_PICK_PERMISSION" "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_oos_tracker.md"
          grep -q "NO_STAKE_PERMISSION" "data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_oos_tracker.md"

      - name: Commit shadow outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_outcome_ledger* 2>/dev/null || true
          git add data/processed/governance/vsigma_api_shadow_rule_outcome_ledger* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_api_shadow_rule_oos_tracker* 2>/dev/null || true
          git add data/processed/governance/vsigma_api_shadow_rule_oos_tracker* 2>/dev/null || true
          git add data/processed/governance/vsigma_api_shadow_rule_oos_rule_registry.csv 2>/dev/null || true
          git add data/processed/governance/vsigma_api_shadow_rule_oos_tracker_history.csv 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_consolidated_daily_operator_panel.md 2>/dev/null || true
          git add data/processed/governance/vsigma_consolidated_daily_operator_panel.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No API shadow rule ledger changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA API shadow rule ledger ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
