name: vSIGMA Evidence Action Router

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha YYYY-MM-DD. Vacío = hoy en Atlantic/Canary"
        required: false
        default: ""
  schedule:
    # 00:50 Atlantic/Canary - route evidence-cleaner actions after cleaner report
    - cron: "50 0 * * *"
      timezone: "Atlantic/Canary"

permissions:
  contents: write
  issues: write

concurrency:
  group: vsigma-evidence-action-router-main
  cancel-in-progress: false

jobs:
  build-action-router:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide action-router date
        shell: bash
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          TODAY="$(TZ=Atlantic/Canary date +%F)"

          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT="$TODAY"
          fi

          echo "VSIGMA_DATE=$DATE_INPUT" >> "$GITHUB_ENV"
          echo "Evidence action router date: $DATE_INPUT"

      - name: Build evidence action router
        shell: bash
        run: |
          python scripts/build_evidence_action_router.py \
            --date "$VSIGMA_DATE" \
            --timezone Atlantic/Canary

      - name: Upload evidence action router artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsigma-evidence-action-router-${{ env.VSIGMA_DATE }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_evidence_action_router.*
            data/processed/governance/vsigma_evidence_action_router.*

      - name: Commit evidence action router outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add \
            data/processed/today/${VSIGMA_DATE}/vsigma_evidence_action_router.* \
            data/processed/governance/vsigma_evidence_action_router.* \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No evidence-action-router output changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA evidence action router ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
