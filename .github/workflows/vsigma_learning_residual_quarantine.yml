name: vSIGMA Learning Residual Quarantine

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha YYYY-MM-DD. Vacío = hoy en Atlantic/Canary"
        required: false
        default: ""
  schedule:
    - cron: "40 1 * * *"
      timezone: "Atlantic/Canary"

permissions:
  contents: write
  issues: write

concurrency:
  group: vsigma-learning-residual-quarantine-main
  cancel-in-progress: false

jobs:
  build-learning-residual-quarantine:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide quarantine date
        shell: bash
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          TODAY="$(TZ=Atlantic/Canary date +%F)"

          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT="$TODAY"
          fi

          echo "VSIGMA_DATE=$DATE_INPUT" >> "$GITHUB_ENV"
          echo "Learning residual quarantine date: $DATE_INPUT"

      - name: Build learning residual quarantine
        shell: bash
        run: |
          python scripts/build_learning_residual_quarantine.py \
            --date "$VSIGMA_DATE" \
            --timezone Atlantic/Canary

      - name: Upload learning residual quarantine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsigma-learning-residual-quarantine-${{ env.VSIGMA_DATE }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_learning_residual_quarantine.*
            data/processed/governance/vsigma_learning_residual_quarantine.*

      - name: Commit learning residual quarantine outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add \
            data/processed/today/${VSIGMA_DATE}/vsigma_learning_residual_quarantine.* \
            data/processed/governance/vsigma_learning_residual_quarantine.* \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No learning-residual-quarantine output changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA learning residual quarantine ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
