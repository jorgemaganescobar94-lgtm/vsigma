name: vSIGMA Forced API Board Fixture Lineups

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  workflow_run:
    workflows:
      - vSIGMA Daily Decision Chain v2
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: vsigma-forced-api-board-fixture-lineups-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
      API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      X_RAPIDAPI_KEY: ${{ secrets.X_RAPIDAPI_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install requests
          fi

      - name: Decide date
        shell: bash
        run: |
          D=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            D="${{ inputs.date }}"
          fi
          if [ -z "$D" ] && [ -f ".vsigma/triggers/daily_decision_chain_v2.trigger" ]; then
            D="$(grep -E '^date=' .vsigma/triggers/daily_decision_chain_v2.trigger | tail -1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
          echo "Resolved VSIGMA_DATE=$D"

      - name: Force API board fixture lineups refresh
        shell: bash
        run: |
          python -m py_compile scripts/force_api_board_fixture_lineups_refresh.py
          python scripts/force_api_board_fixture_lineups_refresh.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary --limit 20

      - name: Apply forced API lineup bridge to board
        shell: bash
        run: |
          python -m py_compile scripts/apply_forced_api_lineup_bridge_to_board.py
          python scripts/apply_forced_api_lineup_bridge_to_board.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build prematch match story engine
        shell: bash
        run: |
          python -m py_compile scripts/build_prematch_match_story_engine.py
          python scripts/build_prematch_match_story_engine.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build prematch story accuracy ledger
        shell: bash
        run: |
          python -m py_compile scripts/build_prematch_story_accuracy_ledger.py
          python scripts/build_prematch_story_accuracy_ledger.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Build rolling prematch accuracy dashboard
        shell: bash
        run: |
          python -m py_compile scripts/build_rolling_prematch_accuracy_dashboard.py
          python scripts/build_rolling_prematch_accuracy_dashboard.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary

      - name: Assert forced lineup outputs
        shell: bash
        run: |
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_forced_api_board_fixture_lineups.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_forced_api_board_fixture_lineups.csv"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_forced_api_lineup_bridge_to_board.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_daily_execution_board_lineup_bridged.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_prematch_match_story_engine.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_prematch_match_story_engine.csv"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_prematch_story_accuracy_ledger.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_prematch_story_accuracy_ledger.csv"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_rolling_prematch_accuracy_dashboard.md"
          test -s "data/processed/today/${VSIGMA_DATE}/vsigma_rolling_prematch_accuracy_dashboard.csv"
          grep -q "Prematch Match Story Engine" "data/processed/today/${VSIGMA_DATE}/vsigma_prematch_match_story_engine.md"
          grep -q "Prematch Story Accuracy Ledger" "data/processed/today/${VSIGMA_DATE}/vsigma_prematch_story_accuracy_ledger.md"
          grep -q "Rolling Prematch Accuracy Dashboard" "data/processed/today/${VSIGMA_DATE}/vsigma_rolling_prematch_accuracy_dashboard.md"

      - name: Commit forced lineup outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/processed/today/${VSIGMA_DATE}/vsigma_forced_api_board_fixture_lineups* 2>/dev/null || true
          git add data/processed/governance/vsigma_forced_api_board_fixture_lineups* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_forced_api_lineup_bridge_to_board* 2>/dev/null || true
          git add data/processed/governance/vsigma_forced_api_lineup_bridge_to_board* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_daily_execution_board_lineup_bridged* 2>/dev/null || true
          git add data/processed/governance/vsigma_daily_execution_board_lineup_bridged* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_prematch_match_story_engine* 2>/dev/null || true
          git add data/processed/governance/vsigma_prematch_match_story_engine* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_prematch_story_accuracy_ledger* 2>/dev/null || true
          git add data/processed/governance/vsigma_prematch_story_accuracy_ledger* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_rolling_prematch_accuracy_dashboard* 2>/dev/null || true
          git add data/processed/governance/vsigma_rolling_prematch_accuracy_dashboard* 2>/dev/null || true
          git add data/processed/today/${VSIGMA_DATE}/vsigma_consolidated_daily_operator_panel.md 2>/dev/null || true
          git add data/processed/governance/vsigma_consolidated_daily_operator_panel.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No forced API board fixture lineup changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA rolling prematch accuracy ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
