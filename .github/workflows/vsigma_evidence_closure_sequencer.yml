name: vSIGMA Evidence Closure Sequencer

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha YYYY-MM-DD. Vacío = hoy en Atlantic/Canary"
        required: false
        default: ""
  schedule:
    - cron: "30 1 * * *"
      timezone: "Atlantic/Canary"

permissions:
  contents: write
  issues: write

concurrency:
  group: vsigma-evidence-closure-sequencer-main
  cancel-in-progress: false

jobs:
  build-evidence-closure-sequencer:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide sequence date
        shell: bash
        run: |
          DATE_INPUT="${{ github.event.inputs.date }}"
          TODAY="$(TZ=Atlantic/Canary date +%F)"

          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT="$TODAY"
          fi

          echo "VSIGMA_DATE=$DATE_INPUT" >> "$GITHUB_ENV"
          echo "Evidence closure sequence date: $DATE_INPUT"

      - name: Build evidence closure sequencer
        shell: bash
        run: |
          python scripts/build_evidence_closure_sequencer.py \
            --date "$VSIGMA_DATE" \
            --timezone Atlantic/Canary

      - name: Upload evidence closure sequence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsigma-evidence-closure-sequencer-${{ env.VSIGMA_DATE }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/processed/today/${{ env.VSIGMA_DATE }}/vsigma_evidence_closure_sequencer.*
            data/processed/governance/vsigma_evidence_closure_sequencer.*

      - name: Commit evidence closure sequence outputs
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add \
            data/processed/today/${VSIGMA_DATE}/vsigma_evidence_closure_sequencer.* \
            data/processed/governance/vsigma_evidence_closure_sequencer.* \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No evidence-closure sequence output changes to commit."
            exit 0
          fi

          git commit -m "vSIGMA evidence closure sequencer ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
