name: vSIGMA Automation Health Monitor

on:
  workflow_dispatch:
    inputs:
      date:
        required: false
        default: ""
  schedule:
    - cron: "45 14 * * *"
    - cron: "45 22 * * *"
    - cron: "45 6 * * *"

permissions:
  contents: write

concurrency:
  group: vsigma-automation-health-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decide date
        shell: bash
        run: |
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(TZ=Atlantic/Canary date +%F)"; fi
          echo "VSIGMA_DATE=$D" >> "$GITHUB_ENV"
      - name: Build automation health monitor
        shell: bash
        run: python scripts/build_automation_health_monitor.py --date "$VSIGMA_DATE" --timezone Atlantic/Canary
      - name: Commit health report
        shell: bash
        run: |
          git config user.name "vSIGMA GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/today/${VSIGMA_DATE}/vsigma_automation_health.* data/processed/governance/vsigma_automation_health.* 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No automation health changes to commit."
            exit 0
          fi
          git commit -m "vSIGMA automation health ${VSIGMA_DATE} [skip ci]"
          git push origin HEAD:main
